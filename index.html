<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>L'Empreinte Menu</title>
  <meta name="description" content="L'Empreinte Coffee Shop. Real food. Real coffee. Real people. Menu digital." />
  <meta name="theme-color" content="#371B06" />

  <!-- Open Graph / social share.
       NOTE: og:image should ideally be an ABSOLUTE URL for every platform.
       If your live domain is e.g. https://menu.lempreinte.dz, prepend it to the two
       paths below (og:url and og:image). Relative paths work on most modern crawlers. -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="L'Empreinte Coffee Shop" />
  <meta property="og:title" content="L'Empreinte — Menu" />
  <meta property="og:description" content="Real Food. Real Coffee. Real People." />
  <meta property="og:image" content="assets/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="691" />
  <meta property="og:image:alt" content="L'Empreinte Coffee Shop — Menu" />
  <meta property="og:locale" content="fr_DZ" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="L'Empreinte — Menu" />
  <meta name="twitter:description" content="Real Food. Real Coffee. Real People." />
  <meta name="twitter:image" content="assets/og-image.jpg" />

  <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
  <link rel="apple-touch-icon" href="assets/icon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Allison&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===================== HERO ===================== -->
  <header class="hero" id="top">
    <div class="hero__inner">
      <p class="hero__menu-script">Menu</p>
      <span class="hero__divider" aria-hidden="true"></span>
      <p class="hero__slogan">Real Food. Real Coffee. Real People.</p>
    </div>
  </header>

  <!-- ===================== VIEWS ===================== -->
  <main id="app">

    <!-- HOME: category grid -->
    <section class="view" id="view-home">
      <h2 class="view__lead">Nos catégories</h2>
      <div class="cat-grid" id="catGrid"><!-- injected --></div>
    </section>

    <!-- DETAIL: single category -->
    <section class="view" id="view-category" hidden>
      <div class="detail__bar">
        <button class="back" id="backBtn" type="button" aria-label="Retour aux catégories">
          <span aria-hidden="true">&#8592;</span> Catégories
        </button>
      </div>
      <div class="section__head">
        <h2 class="section__title" id="catTitle"></h2>
        <span class="section__rule"></span>
      </div>
      <div class="grid" id="catItems"><!-- injected --></div>
      <div class="detail__foot">
        <button class="back back--foot" id="backBtnFoot" type="button">
          <span aria-hidden="true">&#8592;</span> Retour aux catégories
        </button>
      </div>
    </section>

  </main>

  <!-- ===================== FOOTER ===================== -->
  <footer class="footer">
    <img class="footer__logo" src="assets/logo.svg" alt="L'Empreinte Coffee Shop" />

    <div class="footer__block">
      <p class="footer__label">Visit us</p>
      <a class="footer__map-link" href="https://maps.app.goo.gl/8tWJAAAsLCPcHjuy6" target="_blank" rel="noopener">
        Mostaganem, Kharouba, en face de la Faculté de Médecine
      </a>
    </div>

    <p class="footer__made">made with <span aria-hidden="true">♥</span> in Mosta by
      <a href="https://linktr.ee/oussama_mekhaldi" target="_blank" rel="noopener">Oussama</a>
    </p>
  </footer>

  <!-- ===================== STICKY SIDE SOCIAL BUBBLES ===================== -->
  <div class="side-social" aria-label="Réseaux sociaux">
    <a class="bubble" href="https://www.instagram.com/lempreinte_coffeeshop/" target="_blank" rel="noopener" aria-label="Instagram">
      <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Instagram_icon.png" alt="Instagram" loading="lazy" />
    </a>
    <a class="bubble" href="https://www.tiktok.com/@lempreinte_coffeeshop" target="_blank" rel="noopener" aria-label="TikTok">
      <img src="https://commons.wikimedia.org/wiki/Special:FilePath/Tiktok_icon.svg" alt="TikTok" loading="lazy" />
    </a>
  </div>

  <a href="#top" class="totop" id="toTop" aria-label="Retour en haut">&#8593;</a>

  <script src="script.js"></script>
</body>
</html>
